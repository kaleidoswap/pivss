# PIVSS server configuration — copy to config.toml and adjust.
# Every field is optional; defaults shown.

listen = "127.0.0.1:8339"
data_dir = "./pivss-data"
name = "pivss-demo"
description = "P2P incentivized versioned storage for Lightning & RGB backups"
# Public base URL clients should use (goes into the nostr announcement).
public_endpoint = "http://127.0.0.1:8339"

# Pricing: sats per stored MiB per billing period.
price_sats_per_mib = 21
billing_period_secs = 86400
max_backup_bytes = 33554432

# Static BOLT12 offer string, used ONLY when [lightning] enable = false
# below (pure demo mode: no wallet, mock payments accepted at face value).
# Once a real wallet is connected its own live offer is used instead, and
# this field — along with the mock payment endpoint — is ignored.
bolt12_offer = ""

[storage]
# "memory" (demo) or "vss" (LDK vss-server: https://github.com/lightningdevkit/vss-server)
backend = "memory"
vss_url = "http://127.0.0.1:8080/vss"
store_id = "pivss"

[nostr]
# hex secret key; generated & persisted to <data_dir>/nostr.key when empty.
secret_key_hex = ""
# KaleidoSwap's relay first, plus a public relay for reach. Clients can
# discover the kind:38831 service announcements here with NDK / nostr-tools.
relays = ["wss://relay.kaleidoswap.com", "wss://nos.lol"]

[torrent]
enable = true
# carl: https://github.com/vincenzopalazzo/carl — when missing, torrents and
# magnet links are still created under <data_dir>/seeds for out-of-band seeding.
carl_bin = "carl"
port = 6881
trackers = []

[lightning]
# When true, the server connects a real breez-sdk-liquid wallet
# (https://github.com/breez/breez-sdk-liquid), creates a durable BOLT12
# offer, and only records a payment once the wallet itself observes it —
# the mock payment endpoint (POST /backups/{id}/payments) is disabled.
# Default false: pure demo mode, no wallet, no network dependency.
enable = false
# "regtest" (no API key, but needs a local Breez regtest stack — see
# https://github.com/breez/breez-sdk-liquid/tree/main/regtest) or "mainnet"
# (needs api_key below). "testnet" is not supported by the underlying SDK.
network = "regtest"
# Required for network = "mainnet". Free key: https://breez.technology
api_key = ""
# BIP39 mnemonic (12 words); generated & persisted to
# <data_dir>/breez-mnemonic.txt when empty. Controls real funds once
# network = "mainnet" — protect this file like any wallet seed.
mnemonic = ""
