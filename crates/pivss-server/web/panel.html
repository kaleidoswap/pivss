<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIVSS · Host Panel</title>
<style>
  :root{--bg:#0b0e14;--card:#131826;--line:#232b3d;--text:#e6eaf2;--dim:#8b94a7;--acc:#5eead4;--warn:#fbbf24;--bad:#f87171;--ok:#4ade80}
  *{box-sizing:border-box;margin:0}
  body{background:var(--bg);color:var(--text);font:14px/1.5 ui-sans-serif,system-ui,-apple-system,sans-serif;padding:24px;max-width:1080px;margin:0 auto}
  h1{font-size:20px;margin-bottom:2px}
  h1 span{color:var(--acc)}
  .sub{color:var(--dim);margin-bottom:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px}
  .card .k{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .card .v{font-size:18px;font-weight:600;margin-top:4px;word-break:break-all;display:flex;align-items:center;gap:4px}
  .card .v.small{font-size:12px;font-weight:400;font-family:ui-monospace,monospace}
  .card .d{color:var(--dim);font-size:12px}
  section{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:16px}
  section h2{font-size:14px;margin-bottom:10px;color:var(--acc)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{color:var(--dim);text-align:left;font-weight:500;padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  code{font-family:ui-monospace,monospace;font-size:12px;color:var(--acc);word-break:break-all}
  .dim{color:var(--dim)}
  button{background:var(--acc);color:#04211c;border:0;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font:inherit}
  button.ghost{background:transparent;color:var(--acc);border:1px solid var(--acc)}
  button:disabled{opacity:.5;cursor:default}
  pre{background:#0a0d13;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:11px;overflow:auto;max-height:260px;margin-top:10px}
  .pill{display:inline-block;padding:1px 8px;border-radius:999px;font-size:11px;border:1px solid var(--line)}
  .pill.ok{color:var(--ok);border-color:var(--ok)}
  .pill.warn{color:var(--warn);border-color:var(--warn)}
  a{color:var(--acc)}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  /* loading spinner, shown inside a button while its action is in flight */
  .spinner{display:inline-block;width:11px;height:11px;border:2px solid rgba(0,0,0,.3);border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite;vertical-align:-1px;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* inline copy-to-clipboard button, next to any long technical string */
  .copy{background:transparent;border:1px solid var(--line);color:var(--dim);border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer;font:inherit;flex-shrink:0}
  .copy:hover{color:var(--text);border-color:var(--acc)}
  code.trunc{display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}

  /* per-relay publish result */
  .relay-result{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid var(--line)}
  .relay-result:last-child{border-bottom:none}
  .relay-result .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .relay-result.ok .dot{background:var(--ok)}
  .relay-result.bad .dot{background:var(--bad)}
  .relay-result .name{font-family:ui-monospace,monospace;font-size:12px}
  .relay-result .detail{color:var(--dim);font-size:12px}
</style>
</head>
<body>
<h1>PIVSS <span>· Host Panel</span></h1>
<div class="sub">P2P Incentivized Versioned Storage Service — VSS + BitTorrent + BOLT12 + nostr &nbsp;·&nbsp; <a href="/app">client app →</a></div>

<div class="grid" id="stats"></div>

<section>
  <h2>Service announcement (nostr)</h2>
  <div class="row">
    <button id="dryrun" class="ghost">Preview event</button>
    <button id="publish">Publish to relays</button>
    <span class="dim" id="relays"></span>
  </div>
  <div id="announce-out"></div>
</section>

<section>
  <h2>Stored backups</h2>
  <table>
    <thead><tr><th>id</th><th>file</th><th>kind</th><th>versions</th><th>latest</th><th>magnet (latest)</th></tr></thead>
    <tbody id="backups"></tbody>
  </table>
</section>

<section>
  <h2>Seeding</h2>
  <table>
    <thead><tr><th>infohash</th><th>status</th><th>detail</th></tr></thead>
    <tbody id="seeds"></tbody>
  </table>
</section>

<section>
  <h2>Payments received</h2>
  <table>
    <thead><tr><th>when</th><th>backup</th><th>amount</th><th>method</th><th>note</th></tr></thead>
    <tbody id="payments"></tbody>
  </table>
</section>

<script>
const $ = id => document.getElementById(id);
const fmtSats = msat => (msat/1000).toLocaleString() + ' sats';
const fmtBytes = b => b > 1048576 ? (b/1048576).toFixed(2)+' MiB' : b > 1024 ? (b/1024).toFixed(1)+' KiB' : b+' B';
const fmtTime = s => new Date(s*1000).toLocaleString();

// Best-effort live BTC/USD rate for display only — never used for anything
// payment-related. Fails soft: USD annotations just don't show if this
// fetch fails (offline, blocked, etc).
let btcUsd = null;
async function fetchBtcUsd() {
  try {
    const r = await fetch('https://mempool.space/api/v1/prices');
    const j = await r.json();
    if (typeof j.USD === 'number') btcUsd = j.USD;
  } catch {}
}
function fmtUsd(sats) {
  if (!btcUsd || !sats) return '';
  const usd = (sats / 1e8) * btcUsd;
  const decimals = usd < 0.01 ? 5 : usd < 1 ? 3 : 2;
  return `≈$${usd.toFixed(decimals)}`;
}

// Safe DOM builder: el(tag, className, ...children) — children are nodes or strings (textContent).
function el(tag, className, ...children) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  for (const c of children) node.append(c);
  return node;
}
function fill(tbody, rows, emptyText, cols) {
  tbody.replaceChildren();
  if (!rows.length) {
    const td = el('td', 'dim', emptyText);
    td.colSpan = cols;
    tbody.append(el('tr', '', td));
    return;
  }
  for (const r of rows) tbody.append(r);
}
function statCard(k, v, d, mono) {
  const val = el('div', mono ? 'v small' : 'v', v);
  const card = el('div', 'card', el('div', 'k', k), val);
  if (d) card.append(el('div', 'd', d));
  return card;
}

// A small "Copy" button next to any long technical string (npub, offers,
// backup ids, magnet links) — these were previously select-and-copy only.
function copyBtn(text) {
  const b = el('button', 'copy', 'Copy');
  b.type = 'button';
  b.onclick = async (e) => {
    e.stopPropagation();
    try {
      await navigator.clipboard.writeText(text);
      b.textContent = 'Copied';
    } catch {
      b.textContent = 'Select & copy';
    }
    setTimeout(() => { b.textContent = 'Copy'; }, 1500);
  };
  return b;
}
function copyableValue(text, truncate) {
  const shown = truncate && text.length > truncate ? text.slice(0, truncate) + '…' : text;
  const wrap = el('div', 'v small', el('code', 'trunc', shown));
  if (text) wrap.append(copyBtn(text));
  return wrap;
}

// Wrap an async handler so the button shows a spinner + disables itself
// while in flight — otherwise clicking Publish gives zero feedback for the
// several seconds a real relay round-trip takes.
function withLoading(btn, busyLabel, fn) {
  return async (...args) => {
    const original = btn.textContent;
    btn.disabled = true;
    btn.replaceChildren(el('span', 'spinner'), document.createTextNode(busyLabel));
    try {
      return await fn(...args);
    } finally {
      btn.disabled = false;
      btn.textContent = original;
    }
  };
}

async function refresh() {
  const info = await (await fetch('/api/v1/info')).json();
  const a = info.announcement;

  const priceCard = el('div', 'card', el('div', 'k', 'Price'),
    el('div', 'v', `${a.price_sats_per_mib} sats/MiB`),
    el('div', 'd', `per ${(a.billing_period_secs/3600).toFixed(0)}h` + (fmtUsd(a.price_sats_per_mib) ? ` · ${fmtUsd(a.price_sats_per_mib)}` : '')),
  );
  const earningsCard = el('div', 'card', el('div', 'k', 'Earnings'),
    el('div', 'v', fmtSats(info.payments_total_msat)),
    el('div', 'd', `${info.payments_count} payments` + (fmtUsd(info.payments_total_msat/1000) ? ` · ${fmtUsd(info.payments_total_msat/1000)}` : '')),
  );
  const nostrCard = el('div', 'card', el('div', 'k', 'Nostr identity'), copyableValue(info.npub));
  const offerCard = el('div', 'card', el('div', 'k', 'BOLT12 offer'), copyableValue(a.bolt12_offer || '', 50));
  if (!a.bolt12_offer) offerCard.querySelector('.v').textContent = 'not configured';

  $('stats').replaceChildren(
    statCard('Service', a.name),
    priceCard,
    statCard('Backups', String(info.backups_count), `${fmtBytes(info.stored_bytes)} stored`),
    earningsCard,
    statCard('Storage backend', info.storage_backend, `seeder: ${info.seeder}`),
    nostrCard,
    offerCard,
  );
  $('relays').textContent = 'relays: ' + info.relays.join(', ');

  const backups = await (await fetch('/api/v1/backups')).json();
  fill($('backups'), backups.map(b => {
    const latest = b.versions[b.versions.length-1] || {};
    const versionsCell = el('td', '');
    for (const v of b.versions) {
      versionsCell.append(`v${v.version} `, el('span', 'dim', `(${fmtBytes(v.size)})`), el('br', ''));
    }
    const latestCell = el('td', '', `v${b.latest_version}`, el('br', ''), el('span', 'dim', fmtTime(b.updated_at)));
    const idCell = el('td', '', el('code', '', b.backup_id), copyBtn(b.backup_id));
    const magnetCell = el('td', '');
    if (latest.magnet) magnetCell.append(el('code', 'trunc', latest.magnet.slice(0, 50) + '…'), copyBtn(latest.magnet));
    return el('tr', '',
      idCell,
      el('td', '', b.filename),
      el('td', '', b.kind),
      versionsCell,
      latestCell,
      magnetCell,
    );
  }), 'no backups yet', 6);

  fill($('seeds'), (info.seed_statuses || []).map(s => el('tr', '',
    el('td', '', el('code', '', s.infohash)),
    el('td', '', el('span', s.seeding ? 'pill ok' : 'pill warn', s.seeding ? 'seeding' : 'not seeding')),
    el('td', 'dim', s.detail),
  )), 'nothing seeded yet', 3);

  const payments = await (await fetch('/api/v1/payments')).json();
  fill($('payments'), payments.map(p => el('tr', '',
    el('td', '', fmtTime(p.paid_at)),
    el('td', '', el('code', '', p.backup_id)),
    el('td', '', fmtSats(p.amount_msat) + (fmtUsd(p.amount_msat/1000) ? ` (${fmtUsd(p.amount_msat/1000)})` : '')),
    el('td', '', el('span', 'pill', p.method)),
    el('td', 'dim', p.note || ''),
  )), 'no payments yet', 5);
}

function renderRelayResults(container, relayResults) {
  container.replaceChildren();
  for (const r of relayResults) {
    container.append(el('div', r.ok ? 'relay-result ok' : 'relay-result bad',
      el('span', 'dot'),
      el('span', 'name', r.relay),
      el('span', 'detail', r.detail),
    ));
  }
}

const dryrunBtn = $('dryrun');
const publishBtn = $('publish');

dryrunBtn.onclick = withLoading(dryrunBtn, 'Loading…', async () => {
  const out = $('announce-out');
  const resp = await fetch('/api/v1/announce', {
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({dry_run: true})
  });
  const body = await resp.json();
  const details = el('details', '', el('summary', '', 'Signed event JSON'), el('pre', '', JSON.stringify(body.event, null, 2)));
  out.replaceChildren(el('div', 'dim', 'Preview only — nothing was sent to any relay.'), details);
});

publishBtn.onclick = withLoading(publishBtn, 'Publishing…', async () => {
  const out = $('announce-out');
  const resp = await fetch('/api/v1/announce', {
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({dry_run: false})
  });
  const body = await resp.json();
  out.replaceChildren();
  renderRelayResults(out, body.relays);
  const details = el('details', '', el('summary', '', 'Signed event JSON'), el('pre', '', JSON.stringify(body.event, null, 2)));
  out.append(details);
});

fetchBtcUsd().then(refresh);
refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
